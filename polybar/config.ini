[colors]
wm-restack = bspwm
autohide = true
background = ${xrdb:color0:#000000}
foreground = ${xrdb:color7:#ffffff}
primary    = ${xrdb:color1:#ff5555}
secondary  = ${xrdb:color2:#50fa7b}
accent     = ${xrdb:color3:#f1fa8c}


[bar/example]
width = 100%
; height = 10pt
; radius = 5pt
monitor = ${env:MONITOR:}
offset-x = 0%
offset-y = 0pt

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-bottom-size = 2pt
border-bottom-color = ${colors.foreground}

padding-left = 1
padding-right = 1

module-margin = 1

separator = 
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=8;3"

; modules-left = launcher xworkspaces spotify spotify-control spotify-next
; modules-left = launcher xworkspaces
modules-left = xworkspaces
; modules-center = xwindow
; modules-center = spotify-previous spotify-control spotify-next
modules-center = player-prev player player-next
modules-right = memory pulseaudio battery power-monitor wireless-network bluetooth date sysmenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

override-redirect = false

[module/launcher]
type = custom/text

content-prefix = ůįĚė
content-prefix-padding-left = 1

content = " "

; "click-(left|middle|right)" will be executed using "/usr/bin/env sh -c $COMMAND"
; click-left = ~/.config/rofi/launchers/type-6/launcher.sh
click-left = bash ~/.config/rofi/custom/menu.sh

[module/sysmenu]
type = custom/text

content-prefix = "ÔÄĎ"
content-prefix-padding = 1

content = " "

click-left = ~/.config/rofi/powermenu/type-4/powermenu.sh

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; full-at = 98

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP0

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 1

; Available tags:
;   <label-charging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-charging>
format-charging = <label-charging>
format-charging-prefix = ůįāĄ
format-charging-prefix-padding = 0

; Available tags:
;   <label-discharging> (default)
;   <bar-capacity>
;   <ramp-capacity>
;   <animation-discharging>
format-discharging = <ramp-capacity><label-discharging>
ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀĽ
ramp-capacity-2 = ůįĀľ
ramp-capacity-3 = ůįĀĹ
ramp-capacity-4 = ůįĀĺ
ramp-capacity-5 = ůįĀŅ
ramp-capacity-6 = ůįāÄ
ramp-capacity-7 = ůįāĀ
ramp-capacity-8 = ůįāā
ramp-capacity-9 = ůįĀĻ
format-discharging-prefix-padding = 1

; Available tags:
;   <label-full> (default)
;   <bar-capacity>
;   <ramp-capacity>
format-full = <label-full>
format-full-prefix = ůįĀĻ
format-full-prefix-padding = 1

; Available tokens:
;   %percentage% (default)
;   %time%
;   %consumption% (shows current charge rate in watts)
label-charging = %percentage%%
label-charging-padding = 1

; Available tokens:
;   %percentage% (default)
;   %time%
;   %consumption% (shows current discharge rate in watts)
label-discharging = %percentage%%
label-discharging-padding = 1

; Available tokens:
;   %percentage% (default)
label-full = Full
label-full-padding = 1

[module/backlight]
type = internal/backlight
card = acpi_video0
enable-scroll = true
format = <ramp>
ramp-0 = Ó¶£
ramp-1 = Ó¶£
ramp-2 = Ó¶é
ramp-3 = Óß£
ramp-4 = Óß£
ramp-padding = 1

[module/xworkspaces]
type = internal/xworkspaces

label-active = ÔĄĎ
# label-active-background = ${colors.secondary}
; label-active-underline = ${colors.primary}
label-active-underline-height = 0.2
label-active-padding = 1

label-occupied = ÔÜí
label-occupied-padding = 1

label-urgent = ÔĄĆ
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = ÔĄĆ
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume><label-volume>

# format-volume = <ramp-volume><label-volume>
# format-volume-overline = ${colors.background}
# format-volume-underline = ${colors.background}

format-muted = <label-muted>
format-muted-prefix = ůįĚü
format-muted-prefix-background = ${colors.background}
format-muted-prefix-padding = 0
# label-muted = ""
# label-muted-padding = 1
# format-muted-overline = ${colors.background}
# format-muted-underline = ${colors.background}

; Available tokens:
;   %percentage% (default)
label-volume = %percentage%%
# label-volume-background = ${colors.background}
label-volume-padding = 1

; Available tokens:
;   %percentage% (default
label-muted = "Muted"
# label-muted-foreground = ${colors.foreground}
# label-muted-background = ${colors.background}
label-muted-padding = 1

; Only applies if <ramp-volume> is used
ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ
ramp-volume-background = ${colors.background}
ramp-volume-padding = 0

; If defined, it will replace <ramp-volume> when
; headphones are plugged in to `headphone_control_numid`
; If undefined, <ramp-volume> will be used for both
; Only applies if <ramp-volume> is used
ramp-headphones-0 = Ó•ľ
amp-headphones-background = ${colors.secondary}
ramp-headphones-padding = 1


[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 1
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/network]
type = internal/network
interface = wlan0
interval = 1

accumulate-stats = true
format-connected = <label-connected>
format-disconnected = <label-disconnected>
click-left = nmtui

label-connected = %essid%
label-connected-foreground = ${colors.foreground}
format-connected-prefix = Ó®é
format-connected-prefix-padding = 1


; Default: (none)
label-disconnected = Disconnected
label-disconnected-foreground = ${colors.disabled}
format-disconnected-prefix-foreground = ${colors.disabled}
format-disconnected-prefix = Ó®Ź
format-disconnected-prefix-padding = 1

[module/wireless-network]
type = internal/network
click-left = iwgtk &
interface = wlan0
interval = 1
unknown-as-up = true
format-connected-background = ${colors.background}
format-connected-foreground = ${colors.foreground}
format-connected-padding = 1
format-connected = %{A1:/etc/polybar/rofi-network-manager/rofi-network-manager.sh:}<ramp-signal> <label-connected>%{A}
label-connected = %essid%
format-disconnected-background = ${colors.background}
format-disconnected-foreground = ${colors.foreground}
format-disconnected-padding = 1
format-disconnected = %{A1:/etc/polybar/rofi-network-manager/rofi-network-manager.sh:}<label-disconnected>%{A}
label-disconnected =ůį§≠
ramp-signal-0 = ůį§Į
ramp-signal-1 = ůį§ü
ramp-signal-2 = ůį§Ę
ramp-signal-3 = ůį§•
ramp-signal-4 = ůį§®
; ramp-signal-foreground = ${colors.white}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %I:%M %p
date-alt = %d %b, %Y %a

label = %date%
label-padding = 1
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/player]
type = custom/script
exec = echo $(playerctl status | awk '{if($1=="Playing") print "ůįŹ§"; else if($1=="Paused") print "ůįźä"; else if($1=="Stopped") print "ůįďõ"; else print "Unknown"}')
click-left = playerctl play-pause

[module/player-next]
type = custom/script
exec = echo ůįí≠
click-left = playerctl next

[module/player-prev]
type = custom/script
exec = echo ůįíģ
click-left = playerctl previous

[module/reload-driver]
type = custom/script
exec = modpr
click-left = modprobe atkbd

[module/bluetooth]
type = custom/script
exec = polybar_bluetooth
tail = true
click-left = polybar_bluetooth --toggle &


[module/power-monitor]
type = custom/script
exec = awk '{printf "%.2f W\n", $1/1e6}' /sys/class/power_supply/BAT0/power_now && sleep 5
tail = true

; vim:ft=dosini
